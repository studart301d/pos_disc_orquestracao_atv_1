x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo
    AIRFLOW__WEBSERVER__SECRET_KEY: shopbrasil-local-secret
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends
    postgres-airflow:
      condition: service_healthy
    postgres-analytics:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  postgres-analytics:
    image: postgres:16
    environment:
      POSTGRES_USER: shopbrasil
      POSTGRES_PASSWORD: shopbrasil
      POSTGRES_DB: shopbrasil
    ports:
      - "5433:5432"
    volumes:
      - shopbrasil-analytics:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shopbrasil"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    command: ["bash", "/opt/airflow/scripts/init_airflow.sh"]

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 12
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-metadata:
  shopbrasil-analytics:
